<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="-4 -4 48 48">
  <!-- Glowing shadow from Tailwind's shadow-lg shadow-brand/20 -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#25D366" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- GroundBit Green Background -->
  <rect x="0" y="0" width="40" height="40" rx="10" fill="#25D366" filter="url(#glow)" />
  
  <!-- Lucide 'Leaf' Icon -->
  <g transform="translate(8, 8)" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
    <path d="M2 22 12 12"/>
  </g>
</svg>
